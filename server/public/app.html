<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calqulate Admin</title>
<style>
  :root {
    --bg: #F6F7F8;
    --card: #FFFFFF;
    --card-alt: #F4F6F5;
    --text: #0E1512;
    --muted: #6B7770;
    --faint: #9CA6A0;
    --border: #EBEEEC;
    --primary: #1FA971;
    --primary-soft: #ECF8F2;
    --on-primary: #FFFFFF;
    --pro: #C9992A;
    --pro-soft: #FBF3DE;
    --blue: #5AA9E6;
    --coral: #E8836F;
    --violet: #9A8CE0;
    --track: #EDF0EE;
    --shadow-1: 0 4px 14px rgba(14, 21, 18, .05);
    --shadow-2: 0 14px 44px rgba(14, 21, 18, .12);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0F0D;
      --card: #141A17;
      --card-alt: #1B221E;
      --text: #F2F5F3;
      --muted: #9AA8A1;
      --faint: #6B7770;
      --border: #212927;
      --primary: #3FBF8B;
      --primary-soft: #12241C;
      --on-primary: #04120C;
      --pro: #E0B84C;
      --pro-soft: #241E0F;
      --track: #212927;
      --shadow-1: 0 4px 14px rgba(0, 0, 0, .4);
      --shadow-2: 0 14px 44px rgba(0, 0, 0, .55);
    }
  }
  * { box-sizing: border-box; }
  html, body { height: 100%; }
  body {
    margin: 0;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    font-size: 15px;
    line-height: 1.45;
    -webkit-font-smoothing: antialiased;
  }
  a { color: inherit; }
  button, input, select, textarea { font-family: inherit; font-size: inherit; color: inherit; }

  /* ---------- shell ---------- */
  .shell { display: grid; grid-template-columns: 248px 1fr; min-height: 100vh; }
  .sidebar {
    background: var(--card);
    border-right: 1px solid var(--border);
    padding: 24px 16px;
    display: flex; flex-direction: column; gap: 4px;
    position: sticky; top: 0; height: 100vh; overflow-y: auto;
  }
  .brand { display: flex; align-items: center; gap: 11px; padding: 0 8px 22px; }
  .brand .mark {
    width: 34px; height: 34px; border-radius: 11px;
    background: var(--primary); color: var(--on-primary);
    display: grid; place-items: center; font-weight: 700; letter-spacing: -.5px;
  }
  .brand strong { font-size: 16px; letter-spacing: -.3px; display: block; }
  .brand span { font-size: 11px; color: var(--faint); letter-spacing: .5px; text-transform: uppercase; font-weight: 600; }
  .navlink {
    display: flex; align-items: center; gap: 10px;
    padding: 10px 12px; border-radius: 14px;
    color: var(--muted); font-size: 14px; font-weight: 500;
    text-decoration: none; cursor: pointer;
    transition: background .15s, color .15s;
    white-space: nowrap;
  }
  .navlink:hover { background: var(--card-alt); color: var(--text); }
  .navlink.active { background: var(--primary-soft); color: var(--primary); font-weight: 600; }
  .navlink .dot { width: 7px; height: 7px; border-radius: 50%; background: currentColor; opacity: .5; flex: none; }
  .navlink.active .dot { opacity: 1; }
  .sidebar .spacer { flex: 1; }
  .who { padding: 12px; border-radius: 16px; background: var(--card-alt); font-size: 12px; color: var(--muted); }
  .who b { display: block; color: var(--text); font-size: 13px; margin-bottom: 6px; word-break: break-all; }

  .main { padding: 32px 36px 64px; max-width: 1280px; width: 100%; }
  .page-head { display: flex; align-items: flex-end; justify-content: space-between; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
  h1 { font-size: 28px; line-height: 34px; letter-spacing: -.6px; margin: 0 0 4px; }
  .page-head p { margin: 0; color: var(--muted); font-size: 14px; }
  h2 { font-size: 17px; letter-spacing: -.2px; margin: 0 0 14px; }

  /* ---------- primitives ---------- */
  .card {
    background: var(--card); border: 1px solid var(--border);
    border-radius: 22px; padding: 22px; box-shadow: var(--shadow-1);
  }
  .grid { display: grid; gap: 16px; }
  .tiles { grid-template-columns: repeat(auto-fit, minmax(190px, 1fr)); }
  .tile .label { font-size: 11px; font-weight: 600; letter-spacing: .7px; text-transform: uppercase; color: var(--faint); }
  .tile .value { font-size: 32px; line-height: 38px; font-weight: 700; letter-spacing: -1px; margin: 8px 0 2px; }
  .tile .foot { font-size: 12.5px; color: var(--muted); }
  .tile.gold .value { color: var(--pro); }
  .tile.green .value { color: var(--primary); }

  .btn {
    border: 0; border-radius: 999px; padding: 10px 18px;
    font-size: 14px; font-weight: 600; cursor: pointer;
    background: var(--primary); color: var(--on-primary);
    transition: opacity .15s, transform .15s;
  }
  .btn:hover { opacity: .9; }
  .btn:active { transform: scale(.98); }
  .btn[disabled] { opacity: .5; cursor: not-allowed; }
  .btn.ghost { background: var(--card-alt); color: var(--text); }
  .btn.danger { background: rgba(232,131,111,.16); color: var(--coral); }
  .btn.gold { background: var(--pro); color: #1a1405; }
  .btn.sm { padding: 7px 13px; font-size: 13px; }

  input[type=text], input[type=email], input[type=number], input[type=search], select, textarea {
    width: 100%; padding: 10px 13px; background: var(--bg);
    border: 1px solid var(--border); border-radius: 13px; outline: none;
    transition: border-color .15s, box-shadow .15s;
  }
  input:focus, select:focus, textarea:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  textarea { resize: vertical; min-height: 96px; line-height: 1.5; }
  label.field { display: block; margin-bottom: 14px; }
  label.field > span { display: block; font-size: 12px; font-weight: 600; letter-spacing: .4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }

  .toolbar { display: flex; gap: 10px; flex-wrap: wrap; align-items: center; margin-bottom: 16px; }
  .toolbar .grow { flex: 1; min-width: 200px; }
  .toolbar select { width: auto; min-width: 130px; }

  table { width: 100%; border-collapse: collapse; font-size: 14px; }
  .table-wrap { overflow-x: auto; border-radius: 18px; border: 1px solid var(--border); }
  th {
    text-align: left; font-size: 11px; letter-spacing: .6px; text-transform: uppercase;
    color: var(--faint); font-weight: 600; padding: 12px 16px;
    background: var(--card-alt); white-space: nowrap;
  }
  td { padding: 13px 16px; border-top: 1px solid var(--border); white-space: nowrap; }
  tbody tr { background: var(--card); }
  tbody tr.click { cursor: pointer; }
  tbody tr.click:hover { background: var(--card-alt); }
  td .sub { display: block; font-size: 12px; color: var(--faint); }

  .pill {
    display: inline-block; padding: 4px 10px; border-radius: 999px;
    font-size: 11px; font-weight: 700; letter-spacing: .4px; text-transform: uppercase;
    background: var(--track); color: var(--muted);
  }
  .pill.pro { background: var(--pro-soft); color: var(--pro); }
  .pill.active { background: var(--primary-soft); color: var(--primary); }
  .pill.trialing { background: rgba(90,169,230,.16); color: var(--blue); }
  .pill.cancelled, .pill.billing_issue { background: rgba(232,131,111,.16); color: var(--coral); }
  .pill.expired { background: var(--track); color: var(--faint); }
  .pill.open { background: rgba(90,169,230,.16); color: var(--blue); }
  .pill.pending { background: var(--pro-soft); color: var(--pro); }
  .pill.resolved { background: var(--primary-soft); color: var(--primary); }

  .pager { display: flex; align-items: center; gap: 12px; justify-content: flex-end; margin-top: 14px; font-size: 13px; color: var(--muted); }

  .bars { display: flex; align-items: flex-end; gap: 4px; height: 90px; margin-top: 8px; }
  .bars i { flex: 1; background: var(--primary); border-radius: 4px 4px 2px 2px; opacity: .8; min-height: 3px; }

  .feed { list-style: none; margin: 0; padding: 0; }
  .feed li { display: flex; gap: 12px; padding: 11px 0; border-top: 1px solid var(--border); font-size: 13.5px; }
  .feed li:first-child { border-top: 0; padding-top: 0; }
  .feed .when { margin-left: auto; color: var(--faint); font-size: 12px; white-space: nowrap; }
  .feed .who2 { color: var(--muted); }

  .switch { position: relative; width: 46px; height: 27px; flex: none; }
  .switch input { position: absolute; opacity: 0; width: 100%; height: 100%; margin: 0; cursor: pointer; }
  .switch span {
    position: absolute; inset: 0; border-radius: 999px; background: var(--track);
    transition: background .2s; pointer-events: none;
  }
  .switch span::after {
    content: ''; position: absolute; top: 3px; left: 3px; width: 21px; height: 21px;
    border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.25); transition: transform .2s;
  }
  .switch input:checked + span { background: var(--primary); }
  .switch input:checked + span::after { transform: translateX(19px); }

  input[type=range] { width: 100%; accent-color: var(--primary); }

  .flagrow { display: flex; align-items: center; gap: 16px; padding: 18px 0; border-top: 1px solid var(--border); flex-wrap: wrap; }
  .flagrow:first-child { border-top: 0; padding-top: 0; }
  .flagrow .meta { flex: 1; min-width: 220px; }
  .flagrow code { font-size: 14px; font-weight: 600; letter-spacing: -.2px; }
  .flagrow .desc { font-size: 13px; color: var(--muted); margin-top: 3px; }
  .rollout { width: 180px; }
  .rollout .top { display: flex; justify-content: space-between; font-size: 11px; color: var(--faint); text-transform: uppercase; letter-spacing: .5px; font-weight: 600; margin-bottom: 4px; }

  /* ---------- drawer ---------- */
  .scrim {
    position: fixed; inset: 0; background: rgba(14,21,18,.42);
    opacity: 0; pointer-events: none; transition: opacity .25s; z-index: 40;
  }
  .scrim.open { opacity: 1; pointer-events: auto; }
  .drawer {
    position: fixed; top: 0; right: 0; height: 100vh; width: 460px; max-width: 100vw;
    background: var(--bg); border-left: 1px solid var(--border);
    box-shadow: var(--shadow-2); z-index: 41;
    transform: translateX(100%); transition: transform .28s cubic-bezier(.2,.8,.2,1);
    overflow-y: auto; padding: 24px;
  }
  .drawer.open { transform: translateX(0); }
  .drawer .close { float: right; }
  .kv { display: flex; justify-content: space-between; gap: 16px; padding: 9px 0; border-top: 1px solid var(--border); font-size: 13.5px; }
  .kv:first-child { border-top: 0; }
  .kv .k { color: var(--muted); }
  .kv .v { font-weight: 600; text-align: right; word-break: break-all; }

  .toast {
    position: fixed; left: 50%; bottom: 28px; transform: translate(-50%, 20px);
    background: var(--text); color: var(--bg); padding: 12px 20px; border-radius: 999px;
    font-size: 13.5px; font-weight: 500; box-shadow: var(--shadow-2);
    opacity: 0; pointer-events: none; transition: all .25s; z-index: 60; max-width: 90vw; text-align: center;
  }
  .toast.show { opacity: 1; transform: translate(-50%, 0); }

  .empty { padding: 44px 20px; text-align: center; color: var(--faint); font-size: 14px; }
  .chips { display: flex; flex-wrap: wrap; gap: 8px; }
  .chip { display: inline-flex; align-items: center; gap: 7px; padding: 7px 13px; border-radius: 999px; background: var(--card-alt); font-size: 13px; font-weight: 500; }
  .chip i { width: 8px; height: 8px; border-radius: 50%; background: var(--faint); }
  .chip.on i { background: var(--primary); }
  .chip.off i { background: var(--coral); }
  .note { font-size: 13px; color: var(--muted); line-height: 1.6; }

  @media (max-width: 900px) {
    .shell { grid-template-columns: 1fr; }
    .sidebar {
      position: static; height: auto; flex-direction: row; align-items: center;
      overflow-x: auto; padding: 12px; gap: 6px; border-right: 0; border-bottom: 1px solid var(--border);
    }
    .brand { padding: 0 12px 0 4px; }
    .brand .meta, .sidebar .spacer, .who { display: none; }
    .main { padding: 20px 16px 56px; }
    h1 { font-size: 24px; }
    .drawer { width: 100%; }
  }
</style>
</head>
<body>
<div class="shell">
  <nav class="sidebar">
    <div class="brand">
      <div class="mark">C</div>
      <div class="meta"><strong>Calqulate</strong><span>Admin</span></div>
    </div>
    <a class="navlink" data-route="overview"><i class="dot"></i>Overview</a>
    <a class="navlink" data-route="users"><i class="dot"></i>Users</a>
    <a class="navlink" data-route="subscriptions"><i class="dot"></i>Subscriptions</a>
    <a class="navlink" data-route="notifications"><i class="dot"></i>Notifications</a>
    <a class="navlink" data-route="flags"><i class="dot"></i>Feature Flags</a>
    <a class="navlink" data-route="support"><i class="dot"></i>Support</a>
    <a class="navlink" data-route="audit"><i class="dot"></i>Audit Logs</a>
    <a class="navlink" data-route="settings"><i class="dot"></i>Settings</a>
    <div class="spacer"></div>
    <div class="who"><b id="whoami">—</b><button class="btn ghost sm" id="logout">Sign out</button></div>
  </nav>
  <main class="main" id="view"></main>
</div>

<div class="scrim" id="scrim"></div>
<aside class="drawer" id="drawer"></aside>
<div class="toast" id="toast"></div>

<script>
/* ------------------------------------------------------------------ utils */
const $ = (id) => document.getElementById(id);

function esc(value) {
  if (value === null || value === undefined) return '';
  return String(value).replace(/[&<>"']/g, (c) =>
    ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;' }[c]));
}

async function api(path, options) {
  const res = await fetch('/api' + path, {
    headers: { 'content-type': 'application/json' },
    ...options,
  });
  if (res.status === 401) { window.location.href = '/login'; throw new Error('unauthorized'); }
  const json = await res.json().catch(() => ({}));
  if (!res.ok) throw new Error(json.message || json.error || 'Request failed');
  return json;
}

let toastTimer;
function toast(message) {
  const el = $('toast');
  el.textContent = message;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 3600);
}

const fmtMoney = (n) => '$' + Number(n || 0).toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
const fmtNum = (n) => Number(n || 0).toLocaleString('en-US');

function fmtDate(ms) {
  if (!ms) return '—';
  return new Date(ms).toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' });
}

function fmtAgo(ms) {
  if (!ms) return '—';
  const diff = Date.now() - ms;
  const mins = Math.round(diff / 60000);
  if (mins < 1) return 'just now';
  if (mins < 60) return mins + 'm ago';
  const hours = Math.round(mins / 60);
  if (hours < 24) return hours + 'h ago';
  const days = Math.round(hours / 24);
  if (days < 30) return days + 'd ago';
  return fmtDate(ms);
}

const statusPill = (status) =>
  status ? `<span class="pill ${esc(status)}">${esc(String(status).replace('_', ' '))}</span>` : '<span class="pill">none</span>';

function head(title, subtitle, actions) {
  return `<div class="page-head"><div><h1>${esc(title)}</h1><p>${esc(subtitle)}</p></div><div style="display:flex;gap:8px;flex-wrap:wrap">${actions || ''}</div></div>`;
}

function pager(state, meta) {
  return `<div class="pager">
    <span>Page ${meta.page} of ${meta.pages} · ${fmtNum(meta.total)} total</span>
    <button class="btn ghost sm" data-page="${meta.page - 1}" ${meta.page <= 1 ? 'disabled' : ''}>Previous</button>
    <button class="btn ghost sm" data-page="${meta.page + 1}" ${meta.page >= meta.pages ? 'disabled' : ''}>Next</button>
  </div>`;
}

/* ----------------------------------------------------------------- routes */
const view = $('view');

const routes = {
  overview: renderOverview,
  users: renderUsers,
  subscriptions: renderSubscriptions,
  notifications: renderNotifications,
  flags: renderFlags,
  support: renderSupport,
  audit: renderAudit,
  settings: renderSettings,
};

function go(route) {
  if (window.location.hash !== '#' + route) { window.location.hash = route; return; }
  render(route);
}

async function render(route) {
  const fn = routes[route] || routes.overview;
  document.querySelectorAll('.navlink').forEach((a) =>
    a.classList.toggle('active', a.dataset.route === (routes[route] ? route : 'overview')));
  view.innerHTML = '<div class="empty">Loading…</div>';
  try {
    await fn();
  } catch (err) {
    view.innerHTML = `<div class="card"><div class="empty">Could not load this page — ${esc(err.message)}</div></div>`;
  }
}

window.addEventListener('hashchange', () => render(window.location.hash.slice(1) || 'overview'));
document.querySelectorAll('.navlink').forEach((a) =>
  a.addEventListener('click', () => go(a.dataset.route)));

$('logout').addEventListener('click', async () => {
  await fetch('/auth/logout', { method: 'POST' });
  window.location.href = '/login';
});

/* --------------------------------------------------------------- overview */
async function renderOverview() {
  const data = await api('/overview');
  const s = data.stats;
  const max = Math.max(1, ...data.signupsByDay.map((d) => d.count));

  const tile = (label, value, foot, tone) =>
    `<div class="card tile ${tone || ''}"><div class="label">${esc(label)}</div><div class="value">${value}</div><div class="foot">${esc(foot)}</div></div>`;

  view.innerHTML = head('Overview', 'Everything happening across Calqulate right now.') + `
    <div class="grid tiles" style="margin-bottom:16px">
      ${tile('Total users', fmtNum(s.totalUsers), fmtNum(s.active7d) + ' active in 7 days')}
      ${tile('Active Pro', fmtNum(s.activePro), s.conversion + '% of all users', 'gold')}
      ${tile('Trials running', fmtNum(s.trials), 'converting into Pro')}
      ${tile('MRR estimate', fmtMoney(s.mrr), 'list price, excludes trials', 'green')}
      ${tile('Signups · 7d', fmtNum(s.signups7d), 'new accounts this week')}
      ${tile('Open tickets', fmtNum(s.openTickets), 'awaiting a reply')}
    </div>
    <div class="grid" style="grid-template-columns:1.15fr .85fr">
      <div class="card">
        <h2>Signups · last 30 days</h2>
        <div class="bars">${data.signupsByDay.map((d) =>
          `<i style="height:${Math.round((d.count / max) * 100)}%" title="${esc(d.day)}: ${d.count}"></i>`).join('') ||
          '<div class="empty">No signups recorded yet.</div>'}</div>
      </div>
      <div class="card">
        <h2>Recent activity</h2>
        <ul class="feed">${data.recentActivity.map((a) => `<li>
          <span>${esc(a.action)}${a.target ? ` <span class="who2">· ${esc(a.target)}</span>` : ''}</span>
          <span class="when">${esc(fmtAgo(a.created_at))}</span></li>`).join('') ||
          '<div class="empty">Nothing yet.</div>'}</ul>
      </div>
    </div>`;

  // Stack the two panels on narrow screens.
  if (window.innerWidth < 900) view.querySelector('.grid:last-child').style.gridTemplateColumns = '1fr';
}

/* ------------------------------------------------------------------ users */
const usersState = { page: 1, q: '', status: 'all', platform: 'all', medication: '' };

async function renderUsers() {
  const params = new URLSearchParams({ page: usersState.page, pageSize: 25 });
  if (usersState.q) params.set('q', usersState.q);
  if (usersState.status !== 'all') params.set('status', usersState.status);
  if (usersState.platform !== 'all') params.set('platform', usersState.platform);
  if (usersState.medication) params.set('medication', usersState.medication);

  const data = await api('/users?' + params);
  const exportUrl = '/api/users.csv?' + params;

  const option = (value, label, current) =>
    `<option value="${esc(value)}" ${value === current ? 'selected' : ''}>${esc(label)}</option>`;

  view.innerHTML = head('Users', `${fmtNum(data.total)} accounts matching your filters.`,
    `<a class="btn ghost" href="${exportUrl}">Export CSV</a>`) + `
    <div class="toolbar">
      <input class="grow" type="search" id="q" placeholder="Search name, email or user id" value="${esc(usersState.q)}" />
      <select id="status">
        ${['all', 'pro', 'free', 'trialing', 'expiring'].map((v) =>
          option(v, { all: 'All statuses', pro: 'Pro', free: 'Free', trialing: 'On trial', expiring: 'Expiring soon' }[v], usersState.status)).join('')}
      </select>
      <select id="platform">
        ${['all', 'ios', 'android'].map((v) =>
          option(v, { all: 'All platforms', ios: 'iOS', android: 'Android' }[v], usersState.platform)).join('')}
      </select>
      <select id="medication">
        ${['', 'ozempic', 'wegovy', 'zepbound', 'mounjaro', 'compounded', 'other'].map((v) =>
          option(v, v ? v[0].toUpperCase() + v.slice(1) : 'All medications', usersState.medication)).join('')}
      </select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>User</th><th>Plan</th><th>Medication</th><th>Platform</th><th>Renews</th><th>Last active</th></tr></thead>
      <tbody>${data.users.map((u) => `<tr class="click" data-id="${esc(u.id)}">
        <td><b>${esc(u.name || 'Unnamed')}</b><span class="sub">${esc(u.email || u.id)}</span></td>
        <td>${u.is_pro ? '<span class="pill pro">Pro</span>' : '<span class="pill">Free</span>'}
            ${u.sub_status && u.sub_status !== 'active' ? ' ' + statusPill(u.sub_status) : ''}</td>
        <td>${esc(u.medication || '—')}${u.dose_mg ? `<span class="sub">${u.dose_mg} mg</span>` : ''}</td>
        <td>${esc(u.platform || '—')}</td>
        <td>${esc(fmtDate(u.pro_expires_at))}</td>
        <td>${esc(fmtAgo(u.last_active_at))}</td>
      </tr>`).join('')}</tbody>
    </table>${data.users.length ? '' : '<div class="empty">No users match these filters.</div>'}</div>
    ${pager(usersState, data)}`;

  const reload = () => { usersState.page = 1; renderUsers(); };
  let debounce;
  $('q').addEventListener('input', (e) => {
    usersState.q = e.target.value;
    clearTimeout(debounce);
    debounce = setTimeout(reload, 280);
  });
  ['status', 'platform', 'medication'].forEach((key) =>
    $(key).addEventListener('change', (e) => { usersState[key] = e.target.value; reload(); }));
  view.querySelectorAll('[data-page]').forEach((b) =>
    b.addEventListener('click', () => { usersState.page = Number(b.dataset.page); renderUsers(); }));
  view.querySelectorAll('tr.click').forEach((tr) =>
    tr.addEventListener('click', () => openUser(tr.dataset.id)));
}

/* ----------------------------------------------------------- user drawer */
function closeDrawer() {
  $('drawer').classList.remove('open');
  $('scrim').classList.remove('open');
}
$('scrim').addEventListener('click', closeDrawer);
document.addEventListener('keydown', (e) => { if (e.key === 'Escape') closeDrawer(); });

async function openUser(id) {
  const drawer = $('drawer');
  drawer.classList.add('open');
  $('scrim').classList.add('open');
  drawer.innerHTML = '<div class="empty">Loading…</div>';

  const data = await api('/users/' + encodeURIComponent(id));
  const u = data.user;

  drawer.innerHTML = `
    <button class="btn ghost sm close" id="drawerClose">Close</button>
    <h1 style="font-size:22px;margin-bottom:2px">${esc(u.name || 'Unnamed user')}</h1>
    <p style="margin:0 0 16px;color:var(--muted);font-size:13.5px">${esc(u.email || 'no email on file')}</p>
    <div style="margin-bottom:18px">${u.is_pro ? '<span class="pill pro">Pro member</span>' : '<span class="pill">Free</span>'}</div>

    <div class="card" style="margin-bottom:16px">
      <div class="kv"><span class="k">User id</span><span class="v">${esc(u.id)}</span></div>
      <div class="kv"><span class="k">Joined</span><span class="v">${esc(fmtDate(u.created_at))}</span></div>
      <div class="kv"><span class="k">Last active</span><span class="v">${esc(fmtAgo(u.last_active_at))}</span></div>
      <div class="kv"><span class="k">Medication</span><span class="v">${esc(u.medication || '—')}${u.dose_mg ? ' · ' + u.dose_mg + ' mg' : ''}</span></div>
      <div class="kv"><span class="k">Platform</span><span class="v">${esc(u.platform || '—')}</span></div>
      <div class="kv"><span class="k">Pro expires</span><span class="v">${esc(fmtDate(u.pro_expires_at))}</span></div>
      <div class="kv"><span class="k">Devices</span><span class="v">${data.devices.length}</span></div>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h2>${u.is_pro ? 'Revoke Pro' : 'Grant Pro'}</h2>
      <p class="note" style="margin-top:-6px">${u.is_pro
        ? 'Expires every entitlement on this account immediately.'
        : 'Comps this account a Pro entitlement without a store purchase.'}</p>
      ${u.is_pro ? '' : `<label class="field" style="margin-top:12px"><span>Duration (days)</span><input type="number" id="grantDays" min="1" max="3650" value="30" /></label>`}
      <label class="field"><span>Reason (goes into the audit log)</span><input type="text" id="proReason" placeholder="e.g. support goodwill for double charge" /></label>
      <button class="btn ${u.is_pro ? 'danger' : 'gold'}" id="proAction">${u.is_pro ? 'Revoke Pro' : 'Grant Pro'}</button>
    </div>

    <div class="card" style="margin-bottom:16px">
      <h2>Subscriptions</h2>
      ${data.subscriptions.map((s) => `<div class="kv">
        <span class="k">${esc(s.product_id || '—')}<br><span style="font-size:11px">${esc(s.store || '')}</span></span>
        <span class="v">${statusPill(s.status)}<br><span style="font-size:11px;font-weight:400;color:var(--muted)">${esc(fmtDate(s.expires_at))}</span></span>
      </div>`).join('') || '<div class="note">No subscription history.</div>'}
    </div>

    <div class="card" style="margin-bottom:16px">
      <h2>RevenueCat events</h2>
      <ul class="feed">${data.events.map((e) =>
        `<li><span>${esc(e.type)}</span><span class="when">${esc(fmtAgo(e.received_at))}</span></li>`).join('') ||
        '<div class="note">No webhook events recorded.</div>'}</ul>
    </div>

    <div class="card">
      <h2>Admin activity</h2>
      <ul class="feed">${data.activity.map((a) =>
        `<li><span>${esc(a.action)} <span class="who2">· ${esc(a.actor)}</span></span><span class="when">${esc(fmtAgo(a.created_at))}</span></li>`).join('') ||
        '<div class="note">Nothing recorded for this user.</div>'}</ul>
    </div>`;

  $('drawerClose').addEventListener('click', closeDrawer);
  $('proAction').addEventListener('click', async (e) => {
    e.target.disabled = true;
    try {
      const result = await api('/users/' + encodeURIComponent(u.id) + '/pro', {
        method: 'POST',
        body: JSON.stringify({
          grant: !u.is_pro,
          days: $('grantDays') ? Number($('grantDays').value) : undefined,
          reason: $('proReason').value,
        }),
      });
      toast(result.revenuecat.message);
      await openUser(u.id);
      if ((window.location.hash.slice(1) || 'overview') === 'users') renderUsers();
    } catch (err) {
      toast(err.message);
      e.target.disabled = false;
    }
  });
}

/* ---------------------------------------------------------- subscriptions */
const subsState = { page: 1, status: 'all', store: 'all' };

async function renderSubscriptions() {
  const params = new URLSearchParams({ page: subsState.page, pageSize: 25, status: subsState.status, store: subsState.store });
  const data = await api('/subscriptions?' + params);
  const r = data.rollups;

  const tile = (label, value, foot, tone) =>
    `<div class="card tile ${tone || ''}"><div class="label">${esc(label)}</div><div class="value">${value}</div><div class="foot">${esc(foot)}</div></div>`;
  const count = (status) => (r.byStatus.find((s) => s.status === status) || {}).count || 0;

  view.innerHTML = head('Subscriptions', 'Purchases mirrored from RevenueCat webhooks.') + `
    <div class="grid tiles" style="margin-bottom:16px">
      ${tile('MRR estimate', fmtMoney(r.mrr), 'active paid subscriptions', 'green')}
      ${tile('ARR estimate', fmtMoney(r.arr), 'MRR × 12', 'gold')}
      ${tile('Active', fmtNum(count('active')), 'renewing normally')}
      ${tile('Trialing', fmtNum(count('trialing')), 'in free trial')}
      ${tile('At risk', fmtNum(count('cancelled') + count('billing_issue')), 'cancelled or billing issue')}
    </div>
    <div class="toolbar">
      <select id="subStatus">${['all', 'active', 'trialing', 'cancelled', 'billing_issue', 'expired'].map((v) =>
        `<option value="${v}" ${v === subsState.status ? 'selected' : ''}>${v === 'all' ? 'All statuses' : v.replace('_', ' ')}</option>`).join('')}</select>
      <select id="subStore">${['all', 'APP_STORE', 'PLAY_STORE', 'STRIPE', 'MANUAL'].map((v) =>
        `<option value="${v}" ${v === subsState.store ? 'selected' : ''}>${v === 'all' ? 'All stores' : v.replace('_', ' ')}</option>`).join('')}</select>
    </div>
    <div class="table-wrap"><table>
      <thead><tr><th>Customer</th><th>Product</th><th>Store</th><th>Status</th><th>Period</th><th>Purchased</th><th>Expires</th></tr></thead>
      <tbody>${data.subscriptions.map((s) => `<tr class="click" data-id="${esc(s.user_id)}">
        <td><b>${esc(s.name || 'Unnamed')}</b><span class="sub">${esc(s.email || s.user_id)}</span></td>
        <td>${esc(s.product_id || '—')}</td>
        <td>${esc((s.store || '—').replace('_', ' '))}</td>
        <td>${statusPill(s.status)}</td>
        <td>${esc(s.period_type || '—')}</td>
        <td>${esc(fmtDate(s.purchased_at))}</td>
        <td>${esc(fmtDate(s.expires_at))}</td>
      </tr>`).join('')}</tbody>
    </table>${data.subscriptions.length ? '' : '<div class="empty">No subscriptions match these filters.</div>'}</div>
    ${pager(subsState, data)}`;

  ['subStatus', 'subStore'].forEach((id) => $(id).addEventListener('change', (e) => {
    subsState[id === 'subStatus' ? 'status' : 'store'] = e.target.value;
    subsState.page = 1;
    renderSubscriptions();
  }));
  view.querySelectorAll('[data-page]').forEach((b) =>
    b.addEventListener('click', () => { subsState.page = Number(b.dataset.page); renderSubscriptions(); }));
  view.querySelectorAll('tr.click').forEach((tr) =>
    tr.addEventListener('click', () => openUser(tr.dataset.id)));
}

/* ---------------------------------------------------------- notifications */
async function renderNotifications() {
  const data = await api('/notifications');

  view.innerHTML = head('Notifications', 'Push messages sent through Firebase Cloud Messaging.') + `
    ${data.fcmConfigured ? '' :
      '<div class="card" style="margin-bottom:16px;border-color:var(--pro)"><b>Firebase is not configured.</b><p class="note" style="margin:6px 0 0">Sends are recorded as dry runs. Set FIREBASE_PROJECT_ID, FIREBASE_CLIENT_EMAIL and FIREBASE_PRIVATE_KEY to deliver for real.</p></div>'}
    <div class="grid" style="grid-template-columns:minmax(300px,420px) 1fr">
      <div class="card">
        <h2>Compose</h2>
        <label class="field"><span>Audience</span>
          <select id="audience">
            <option value="all">Everyone</option>
            <option value="pro">Pro members</option>
            <option value="free">Free users</option>
            <option value="trialing">On trial</option>
            <option value="selected">Specific user ids</option>
          </select>
        </label>
        <label class="field" id="idsField" style="display:none"><span>User ids (comma separated)</span>
          <textarea id="userIds" placeholder="user_a1b2…, user_c3d4…" style="min-height:70px"></textarea>
        </label>
        <label class="field"><span>Title</span><input type="text" id="title" maxlength="80" placeholder="Time for your weekly weigh-in" /></label>
        <label class="field"><span>Body</span><textarea id="body" maxlength="300" placeholder="Log today's weight to keep your trend line accurate."></textarea></label>
        <button class="btn" id="send">Send notification</button>
      </div>
      <div class="card">
        <h2>Send history</h2>
        <div class="table-wrap"><table>
          <thead><tr><th>Title</th><th>Audience</th><th>Delivered</th><th>Sent</th></tr></thead>
          <tbody id="historyRows">${notificationRows(data.notifications)}</tbody>
        </table>${data.notifications.length ? '' : '<div class="empty">Nothing sent yet.</div>'}</div>
      </div>
    </div>`;

  if (window.innerWidth < 900) view.querySelector('.grid').style.gridTemplateColumns = '1fr';

  $('audience').addEventListener('change', (e) => {
    $('idsField').style.display = e.target.value === 'selected' ? 'block' : 'none';
  });

  $('send').addEventListener('click', async (e) => {
    const title = $('title').value.trim();
    const body = $('body').value.trim();
    if (!title || !body) { toast('Title and body are both required.'); return; }
    e.target.disabled = true;
    e.target.textContent = 'Sending…';
    try {
      const result = await api('/notifications', {
        method: 'POST',
        body: JSON.stringify({
          title, body,
          audience: $('audience').value,
          userIds: $('userIds').value.split(',').map((s) => s.trim()).filter(Boolean),
        }),
      });
      toast(result.message);
      $('title').value = '';
      $('body').value = '';
      const fresh = await api('/notifications');
      $('historyRows').innerHTML = notificationRows(fresh.notifications);
    } catch (err) {
      toast(err.message);
    }
    e.target.disabled = false;
    e.target.textContent = 'Send notification';
  });
}

function notificationRows(list) {
  return list.map((n) => `<tr>
    <td><b>${esc(n.title)}</b><span class="sub">${esc(n.body.slice(0, 60))}${n.body.length > 60 ? '…' : ''}</span></td>
    <td><span class="pill">${esc(n.audience)}</span></td>
    <td>${n.dry_run ? '<span class="pill">dry run</span>' : fmtNum(n.sent_count) + ' devices'}</td>
    <td>${esc(fmtAgo(n.created_at))}</td>
  </tr>`).join('');
}

/* ---------------------------------------------------------- feature flags */
async function renderFlags() {
  const data = await api('/feature-flags');

  view.innerHTML = head('Feature Flags', 'Toggle features and stage rollouts without shipping a build.') + `
    <div class="card" style="margin-bottom:16px">
      ${data.flags.map((f) => `<div class="flagrow" data-key="${esc(f.key)}">
        <label class="switch"><input type="checkbox" data-toggle ${f.enabled ? 'checked' : ''} /><span></span></label>
        <div class="meta"><code>${esc(f.key)}</code><div class="desc">${esc(f.description || 'No description')}</div></div>
        <div class="rollout">
          <div class="top"><span>Rollout</span><span data-out>${f.rollout_percent}%</span></div>
          <input type="range" min="0" max="100" step="5" value="${f.rollout_percent}" data-rollout />
        </div>
        <button class="btn danger sm" data-delete>Delete</button>
      </div>`).join('') || '<div class="empty">No feature flags yet.</div>'}
    </div>
    <div class="card">
      <h2>New flag</h2>
      <div class="toolbar">
        <input class="grow" type="text" id="flagKey" placeholder="flag_key" />
        <input class="grow" type="text" id="flagDesc" placeholder="What does it do?" />
        <button class="btn" id="flagCreate">Create</button>
      </div>
    </div>`;

  view.querySelectorAll('.flagrow').forEach((row) => {
    const key = row.dataset.key;
    const out = row.querySelector('[data-out]');
    const range = row.querySelector('[data-rollout]');

    row.querySelector('[data-toggle]').addEventListener('change', async (e) => {
      try {
        await api('/feature-flags/' + encodeURIComponent(key), {
          method: 'PATCH',
          body: JSON.stringify({ enabled: e.target.checked }),
        });
        toast(`${key} ${e.target.checked ? 'enabled' : 'disabled'}`);
      } catch (err) { toast(err.message); e.target.checked = !e.target.checked; }
    });

    range.addEventListener('input', () => { out.textContent = range.value + '%'; });
    range.addEventListener('change', async () => {
      try {
        await api('/feature-flags/' + encodeURIComponent(key), {
          method: 'PATCH',
          body: JSON.stringify({ rollout_percent: Number(range.value) }),
        });
        toast(`${key} rollout set to ${range.value}%`);
      } catch (err) { toast(err.message); }
    });

    row.querySelector('[data-delete]').addEventListener('click', async () => {
      if (!confirm(`Delete the flag "${key}"?`)) return;
      try { await api('/feature-flags/' + encodeURIComponent(key), { method: 'DELETE' }); renderFlags(); }
      catch (err) { toast(err.message); }
    });
  });

  $('flagCreate').addEventListener('click', async () => {
    const key = $('flagKey').value.trim();
    if (!key) { toast('A flag key is required.'); return; }
    try {
      await api('/feature-flags', {
        method: 'POST',
        body: JSON.stringify({ key, description: $('flagDesc').value.trim() }),
      });
      renderFlags();
    } catch (err) { toast(err.message); }
  });
}

/* ---------------------------------------------------------------- support */
const supportState = { page: 1, status: '' };

async function renderSupport() {
  const params = new URLSearchParams({ page: supportState.page, pageSize: 25 });
  if (supportState.status) params.set('status', supportState.status);
  const data = await api('/support-tickets?' + params);

  view.innerHTML = head('Support', `${fmtNum(data.total)} tickets from the in-app help sheet.`) + `
    <div class="toolbar">
      <select id="ticketStatus">${['', 'open', 'pending', 'resolved'].map((v) =>
        `<option value="${v}" ${v === supportState.status ? 'selected' : ''}>${v ? v : 'All tickets'}</option>`).join('')}</select>
    </div>
    <div class="grid">${data.tickets.map((t) => `<div class="card" data-ticket="${esc(t.id)}">
      <div style="display:flex;gap:12px;align-items:flex-start;flex-wrap:wrap">
        <div style="flex:1;min-width:220px">
          <div style="display:flex;gap:8px;align-items:center;margin-bottom:4px">
            ${statusPill(t.status)}${t.is_pro ? '<span class="pill pro">Pro</span>' : ''}
            <span style="font-size:12px;color:var(--faint)">${esc(fmtAgo(t.created_at))}</span>
          </div>
          <b style="font-size:15.5px">${esc(t.subject)}</b>
          <p class="note" style="margin:4px 0 0">${esc(t.body)}</p>
          <p class="note" style="margin:8px 0 0;color:var(--faint)">${esc(t.name || 'Unknown')} · ${esc(t.email || t.user_id || 'no account')}</p>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap">
          ${t.user_id ? `<button class="btn ghost sm" data-open="${esc(t.user_id)}">View user</button>` : ''}
          ${t.status !== 'resolved'
            ? `<button class="btn sm" data-resolve="${esc(t.id)}">Resolve</button>`
            : `<button class="btn ghost sm" data-reopen="${esc(t.id)}">Reopen</button>`}
        </div>
      </div>
    </div>`).join('') || '<div class="card"><div class="empty">No tickets here.</div></div>'}</div>
    ${pager(supportState, data)}`;

  $('ticketStatus').addEventListener('change', (e) => {
    supportState.status = e.target.value;
    supportState.page = 1;
    renderSupport();
  });
  view.querySelectorAll('[data-page]').forEach((b) =>
    b.addEventListener('click', () => { supportState.page = Number(b.dataset.page); renderSupport(); }));
  view.querySelectorAll('[data-open]').forEach((b) =>
    b.addEventListener('click', () => openUser(b.dataset.open)));

  const setStatus = async (id, status) => {
    try {
      await api('/support-tickets/' + encodeURIComponent(id), { method: 'PATCH', body: JSON.stringify({ status }) });
      renderSupport();
    } catch (err) { toast(err.message); }
  };
  view.querySelectorAll('[data-resolve]').forEach((b) =>
    b.addEventListener('click', () => setStatus(b.dataset.resolve, 'resolved')));
  view.querySelectorAll('[data-reopen]').forEach((b) =>
    b.addEventListener('click', () => setStatus(b.dataset.reopen, 'open')));
}
