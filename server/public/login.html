<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Calqulate Admin · Sign in</title>
<style>
  :root {
    --bg: #F6F7F8;
    --card: #FFFFFF;
    --text: #0E1512;
    --muted: #6B7770;
    --border: #EBEEEC;
    --primary: #1FA971;
    --primary-soft: #ECF8F2;
    --on-primary: #FFFFFF;
    --danger: #E8836F;
    --shadow: 0 10px 40px rgba(14, 21, 18, 0.07);
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #0B0F0D;
      --card: #141A17;
      --text: #F2F5F3;
      --muted: #9AA8A1;
      --border: #212927;
      --primary: #3FBF8B;
      --primary-soft: #12241C;
      --on-primary: #04120C;
      --shadow: 0 10px 40px rgba(0, 0, 0, 0.45);
    }
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 24px;
    background: var(--bg);
    color: var(--text);
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 100%;
    max-width: 400px;
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 24px;
    padding: 32px;
    box-shadow: var(--shadow);
  }
  .mark {
    width: 44px; height: 44px;
    border-radius: 14px;
    background: var(--primary);
    color: var(--on-primary);
    display: grid; place-items: center;
    font-weight: 700; font-size: 20px;
    letter-spacing: -0.5px;
    margin-bottom: 20px;
  }
  h1 { font-size: 24px; line-height: 30px; letter-spacing: -0.6px; margin: 0 0 6px; }
  p.sub { margin: 0 0 24px; color: var(--muted); font-size: 14px; line-height: 20px; }
  label { display: block; font-size: 12px; font-weight: 600; letter-spacing: 0.4px; text-transform: uppercase; color: var(--muted); margin-bottom: 6px; }
  input {
    width: 100%;
    padding: 13px 14px;
    font-size: 15px;
    font-family: inherit;
    color: var(--text);
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 14px;
    margin-bottom: 16px;
    outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  input:focus { border-color: var(--primary); box-shadow: 0 0 0 3px var(--primary-soft); }
  button {
    width: 100%;
    padding: 14px;
    font-size: 15px;
    font-weight: 600;
    font-family: inherit;
    color: var(--on-primary);
    background: var(--primary);
    border: 0;
    border-radius: 999px;
    cursor: pointer;
    transition: opacity .2s, transform .2s;
  }
  button:hover { opacity: .9; }
  button:active { transform: scale(.99); }
  button[disabled] { opacity: .55; cursor: progress; }
  .error {
    display: none;
    margin: 0 0 16px;
    padding: 11px 14px;
    border-radius: 14px;
    background: rgba(232, 131, 111, .14);
    color: var(--danger);
    font-size: 13px;
    font-weight: 500;
  }
  .error.show { display: block; }
  .hint { margin: 20px 0 0; font-size: 12px; line-height: 18px; color: var(--muted); text-align: center; }
</style>
</head>
<body>
  <form class="card" id="form" autocomplete="on">
    <div class="mark">C</div>
    <h1>Calqulate Admin</h1>
    <p class="sub">Sign in to manage users, subscriptions and releases.</p>
    <div class="error" id="error"></div>
    <label for="email">Email</label>
    <input id="email" name="email" type="email" required autocomplete="username" placeholder="admin@calqulate.app" />
    <label for="password">Password</label>
    <input id="password" name="password" type="password" required autocomplete="current-password" placeholder="••••••••" />
    <button type="submit" id="submit">Sign in</button>
    <p class="hint">Use your Calqulate account. Admin access is granted by <code>profiles.is_admin</code> or the ADMIN_EMAILS allowlist.</p>
  </form>
<script>
  const form = document.getElementById('form');
  const error = document.getElementById('error');
  const submit = document.getElementById('submit');

  form.addEventListener('submit', async (e) => {
    e.preventDefault();
    error.classList.remove('show');
    submit.disabled = true;
    submit.textContent = 'Signing in…';
    try {
      const res = await fetch('/api/login', {
        method: 'POST',
        headers: { 'content-type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value,
          password: document.getElementById('password').value,
        }),
      });
      if (res.ok) { window.location.href = '/'; return; }
      const detail = await res.json().catch(() => ({}));
      error.textContent =
        res.status === 401 ? 'That email and password combination is not recognised.' :
        res.status === 403 ? 'That account is not an admin. Ask an owner to add you to ADMIN_EMAILS.' :
        res.status === 503 ? (detail.message || 'Supabase is not configured on this server.') :
        'Sign in failed. Please try again.';
      error.classList.add('show');
    } catch {
      error.textContent = 'Could not reach the server.';
      error.classList.add('show');
    }
    submit.disabled = false;
    submit.textContent = 'Sign in';
  });
</script>
</body>
</html>
